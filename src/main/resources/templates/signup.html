<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up - Question Paper Generator</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
    <div class="login-page">
        <div class="login-card">
            <h1>Create Account</h1>
            <p>Sign up to access the application</p>

            <div class="alert error" th:if="${error}" th:text="${error}"></div>

            <form class="form" th:action="@{/signup}" method="post">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">

                <div class="form-group">
                    <label for="username">Username</label>
                    <input type="text" id="username" name="username" required>
                </div>

                <div class="form-group">
                    <label for="email">Email</label>
                    <input type="email" id="email" name="email" required>
                </div>

                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" name="password" required>
                </div>

                <div class="form-group">
                    <label for="confirmPassword">Confirm Password</label>
                    <input type="password" id="confirmPassword" name="confirmPassword" required>
                </div>

                <button type="submit" class="btn btn-primary login-btn">Sign Up</button>
            </form>

            <p style="margin-top: 14px; text-align: center;">
                Already have an account? <a th:href="@{/login}">Sign In</a>
            </p>
        </div>
    </div>
</body>
</html>
