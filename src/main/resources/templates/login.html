<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Question Paper Generator</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
    <div class="login-page">
        <div class="login-card">
            <h1>Question Paper Generator</h1>
            <p>Please sign in to continue</p>

            <div class="alert error" th:if="${param.error}">
                Invalid username or password.
            </div>

            <div class="alert success" th:if="${param.logout}">
                You have been logged out successfully.
            </div>

            <div class="alert success" th:if="${param.registered}">
                Registration successful. Please sign in.
            </div>

            <form class="form" th:action="@{/login}" method="post">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                <div class="form-group">
                    <label for="username">Username</label>
                    <input type="text" id="username" name="username" required autofocus>
                </div>
                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" name="password" required>
                </div>
                <button type="submit" class="btn btn-primary login-btn">Sign In</button>
            </form>
            <p style="margin-top: 14px; text-align: center;">
                New user? <a th:href="@{/signup}">Sign Up</a>
            </p>
        </div>
    </div>
</body>
</html>
